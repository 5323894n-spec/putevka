services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: waybills
      POSTGRES_USER: waybills
      POSTGRES_PASSWORD: waybills
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://waybills:waybills@postgres:5432/waybills
      REDIS_URL: redis://redis:6379/0
      JWT_SECRET: change-me
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis

  frontend:
    build: ./frontend
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "5180:5180"
    depends_on:
      - backend

volumes:
  pg_data:
